<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Google Drive - Mes Documents</title>
    <style>
        body { margin: 0; background: #0f0f1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        h1 { font-size: 3rem; background: linear-gradient(90deg, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .search-box { width: 90%; max-width: 600px; }
        input { width: 100%; padding: 15px 25px; border-radius: 50px; border: 1px solid #444; background: rgba(255,255,255,0.05); color: white; font-size: 18px; outline: none; box-sizing: border-box; }
        input:focus { border-color: #00d2ff; box-shadow: 0 0 15px rgba(0,210,255,0.3); }
        .footer { position: fixed; bottom: 10px; color: #444; font-size: 12px; }
    </style>
</head>
<body>

    <h1>INTERSTELLAR</h1>

    <div class="search-box">
        <!-- L'attribut onsubmit est CRUCIAL ici pour la touche Entrée -->
        <form id="searchForm" onsubmit="executeSearch(event)">
            <input type="text" id="userInput" placeholder="Rechercher ou entrer une URL..." autocomplete="off" autofocus>
        </form>
    </div>

    <div class="footer">Système de navigation sécurisé v2.0</div>

    <script>
        function executeSearch(event) {
            // Empêche la page de se recharger bêtement
            event.preventDefault();
            
            const input = document.getElementById('userInput').value;
            if (!input) return;

            let targetUrl;
            // Vérifie si c'est un lien direct ou une recherche
            if (input.includes('.') && !input.includes(' ')) {
                targetUrl = input.startsWith('http') ? input : 'https://' + input;
            } else {
                targetUrl = 'https://www.google.com' + encodeURIComponent(input);
            }

            // Utilisation d'un miroir de secours (CroxyProxy)
            // Si Fortinet bloque ce lien, on devra utiliser un "Worker" perso
            const proxy = "https://www.croxyproxy.com";
            window.location.href = proxy + encodeURIComponent(targetUrl);
        }
    </script>
</body>
</html>
